<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to driver profile — f1gures</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://f1gures.app/standings-drivers/" />
  <style>body{font:14px/1.5 system-ui,sans-serif;margin:40px;color:#444}</style>
  <script>
    (function () {
      var id = new URLSearchParams(location.search).get('id');
      if (!id) { location.replace('/standings-drivers/'); return; }
      // Look up the legacy 3-letter code (e.g. NOR, VER, HAM) in the build's
      // code→driverRef mapping and redirect to the prerendered route. Falls
      // back to the standings page if the code is unknown.
      fetch('/data/archive/_driver-codes.json', { cache: 'force-cache' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (map) {
          var ref = map && map[id];
          if (ref) location.replace('/drivers/' + encodeURIComponent(ref) + '/' + location.hash);
          else location.replace('/standings-drivers/');
        })
        .catch(function () { location.replace('/standings-drivers/'); });
    })();
  </script>
</head>
<body>
  <p>Looking up driver profile…</p>
  <p><a href="/standings-drivers/">Back to standings</a> if you're not redirected.</p>
</body>
</html>
