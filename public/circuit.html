<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to circuit detail - f1gures</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://f1gures.app/circuits/" />
  <style>body{font:14px/1.5 system-ui,sans-serif;margin:40px;color:#444}</style>
  <script>
    (function () {
      // Legacy URL pattern: /circuit.html?id=monaco - id matches our new
      // circuitRef directly. Validate against the circuits index, then
      // redirect to /circuits/<ref>/.
      var id = new URLSearchParams(location.search).get('id');
      if (!id) { location.replace('/circuits/'); return; }
      fetch('/data/archive/_circuits-index.json', { cache: 'force-cache' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (idx) {
          if (!idx) { location.replace('/circuits/'); return; }
          var hit = idx.find(function (c) { return c.circuitRef === id; });
          if (hit) location.replace('/circuits/' + encodeURIComponent(id) + '/');
          else location.replace('/circuits/');
        })
        .catch(function () { location.replace('/circuits/'); });
    })();
  </script>
</head>
<body>
  <p>Looking up circuit…</p>
  <p><a href="/circuits/">Back to circuits</a> if you're not redirected.</p>
</body>
</html>
