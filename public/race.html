<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to race detail - f1gures</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://f1gures.app/calendar/" />
  <style>body{font:14px/1.5 system-ui,sans-serif;margin:40px;color:#444}</style>
  <script>
    (function () {
      // Legacy URL pattern: /race.html?round=N - round-only, current-season
      // assumption baked in by localStorage.f1-year. New URLs are /races/<year>/<round>/.
      var params = new URLSearchParams(location.search);
      var round = params.get('round');
      var year = params.get('year');
      if (!year) {
        try { year = localStorage.getItem('f1-year'); } catch (e) {}
      }
      if (year === 'current' || !year) year = String(new Date().getFullYear());
      if (!round) { location.replace('/calendar/'); return; }
      // Validate against the races index - if year/round doesn't exist, send
      // the user to the calendar instead of a 404.
      fetch('/data/archive/_races-index.json', { cache: 'force-cache' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (idx) {
          if (!idx) { location.replace('/calendar/'); return; }
          var found = idx.find(function (e) { return String(e.year) === String(year) && String(e.round) === String(round); });
          if (found) location.replace('/races/' + year + '/' + round + '/');
          else location.replace('/calendar/');
        })
        .catch(function () { location.replace('/calendar/'); });
    })();
  </script>
</head>
<body>
  <p>Looking up race…</p>
  <p><a href="/calendar/">Back to calendar</a> if you're not redirected.</p>
</body>
</html>
