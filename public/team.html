<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to team profile - f1gures</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://f1gures.app/standings-constructors/" />
  <style>body{font:14px/1.5 system-ui,sans-serif;margin:40px;color:#444}</style>
  <script>
    (function () {
      // Legacy URL pattern: /team.html?id=ferrari - id matches our new
      // constructorRef directly. Validate against the teams index, then
      // redirect to /teams/<ref>/.
      var id = new URLSearchParams(location.search).get('id');
      if (!id) { location.replace('/standings-constructors/'); return; }
      fetch('/data/archive/_teams-index.json', { cache: 'force-cache' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (idx) {
          if (!idx) { location.replace('/standings-constructors/'); return; }
          var hit = idx.find(function (t) { return t.constructorRef === id; });
          if (hit) location.replace('/teams/' + encodeURIComponent(id) + '/');
          else location.replace('/standings-constructors/');
        })
        .catch(function () { location.replace('/standings-constructors/'); });
    })();
  </script>
</head>
<body>
  <p>Looking up team…</p>
  <p><a href="/standings-constructors/">Back to constructors</a> if you're not redirected.</p>
</body>
</html>
