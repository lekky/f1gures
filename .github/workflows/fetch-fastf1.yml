name: Fetch FastF1 Weekend Data

# Pulls per-session timing/telemetry data for completed sessions of the
# current season via FastF1 (scripts/fetch-fastf1.py --auto), commits the
# derived JSONs (public/data/fastf1/<year>/<round>/), then rebuilds and
# FTP-deploys so race pages grow their Weekend Analysis tabs during the
# weekend itself.
#
# Cadence: every 15 minutes across race weekends. F1's live-timing archive
# publishes a session ~30-60 min after it ends, so this puts charts live
# within ~15 min of FastF1 having the data. Affordable because of a two-stage
# gate:
#   1. scripts/fastf1-pending.mjs (Node built-ins, <1s, no installs) checks
#      whether any recently-finished session is missing on disk — when not,
#      the run ends after checkout (~20-30s billed). This is ~90% of polls.
#   2. npm ci / build / FTP only run when the fetch actually committed new
#      data — mirroring refresh-current-season.yml.
# workflow_dispatch bypasses both gates (backfills / force-redeploys).
#
# Shares the `deploy` concurrency group with deploy.yml and
# refresh-current-season.yml so FTP syncs never overlap.

on:
  schedule:
    # Race weekends: Fri through Sun, all day (sessions span ~04:00 UTC
    # Vegas practice to ~23:00 UTC Americas races), plus early Monday for
    # anything that publishes late.
    - cron: '*/15 * * * FRI,SAT,SUN'
    - cron: '*/15 0-7 * * MON'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stage-1 gate: is any recently-finished session missing on disk?
      - name: Check for pending sessions
        id: gate
        run: |
          PENDING=$(node scripts/fastf1-pending.mjs)
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-fastf1.txt

      # FastF1's raw-response cache: keeps within-weekend reruns fast and
      # avoids re-downloading telemetry for sessions we already saw.
      - name: Cache FastF1 session data
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: .fastf1-cache
          key: fastf1-cache-${{ github.run_id }}
          restore-keys: |
            fastf1-cache-

      - name: Install FastF1
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install -r scripts/requirements-fastf1.txt

      - name: Fetch completed sessions
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/fetch-fastf1.py --auto

      - name: Commit data if changed
        id: commit
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/data/fastf1
          if git diff --cached --quiet; then
            echo "No new FastF1 data - skipping build & deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): FastF1 session data refresh"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Cache OG images
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: public/images/og
          # Same key family as deploy.yml / refresh-current-season.yml.
          key: og-images-v1-${{ hashFiles('data/history/**', 'public/data/*.json', 'scripts/build-archive.mjs', 'scripts/generate-og-images.mjs', 'scripts/og-templates/**', 'package-lock.json') }}

      - name: Build Astro site
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Deploy via FTP
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local-dir: ./dist/
          state-name: .ftp-deploy-sync-state-dist.json
