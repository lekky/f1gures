name: Fetch FastF1 Weekend Data

# ⚠️ SCHEDULE DISABLED — the FastF1 fetch does NOT work from GitHub's runners.
# F1's live-timing API refuses datacenter IPs: every scheduled run failed at
# "Failed to load session info data!" while the identical fetch succeeds from a
# residential IP. So the automated fetch now runs LOCALLY via
# scripts/fetch-and-deploy-local.ps1 (Windows Task Scheduler on a residential
# machine), which fetches, commits to main, and dispatches deploy.yml.
#
# This workflow is kept dispatch-only as a manual fallback (e.g. to retry from
# CI if F1 ever opens the API to cloud IPs, or when triggered on a self-hosted
# runner with a residential egress). It runs scripts/fetch-fastf1.py --auto,
# commits any new session JSON, then builds + FTP-deploys — gated on a real
# data change, sharing the `deploy` concurrency group. Left here rather than
# deleted so the wiring is one edit away if the constraint changes.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stage-1 gate: is any recently-finished session missing on disk?
      - name: Check for pending sessions
        id: gate
        run: |
          PENDING=$(node scripts/fastf1-pending.mjs)
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-fastf1.txt

      # NB: we deliberately do NOT persist .fastf1-cache across runs. FastF1's
      # raw-response cache (fastf1_http_cache.sqlite) stores the empty "session
      # not ready" responses returned when we poll a just-finished session
      # before F1 publishes its archive. Restoring that sqlite from a prior run
      # re-serves the stale empty forever, so the session never loads even once
      # its data goes live (this stranded the 2026 Belgian GP FP2 tab). Each run
      # starts with a fresh cache and queries the live API. The only cost is
      # re-downloading the one pending session's data per run — the fetcher
      # skips on-disk sessions, so finished sessions are never re-fetched.

      - name: Install FastF1
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install -r scripts/requirements-fastf1.txt

      - name: Fetch completed sessions
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/fetch-fastf1.py --auto

      - name: Commit data if changed
        id: commit
        if: steps.gate.outputs.pending == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/data/fastf1
          if git diff --cached --quiet; then
            echo "No new FastF1 data - skipping build & deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): FastF1 session data refresh"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Cache OG images
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: public/images/og
          # Same key family as deploy.yml / refresh-current-season.yml.
          key: og-images-v1-${{ hashFiles('data/history/**', 'public/data/*.json', 'scripts/build-archive.mjs', 'scripts/generate-og-images.mjs', 'scripts/og-templates/**', 'package-lock.json') }}

      - name: Build Astro site
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Deploy via FTP
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local-dir: ./dist/
          state-name: .ftp-deploy-sync-state-dist.json
