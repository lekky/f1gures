name: Refresh Current Season

# Pulls the latest race results, qualifying, sprint and standings for the
# current calendar year from the Jolpica API, commits the bundle (so future
# builds have it cached), then rebuilds and FTP-deploys the site so the
# prerendered HTML reflects the new standings.
#
# Build + FTP are gated on the bundle actually having changed. So is
# `npm ci`: the fetch + change-detection path uses only Node built-ins
# (fetch-season.mjs imports nothing from node_modules), so a no-op poll
# skips dependency install entirely and bills ~1 minute instead of 2-3.
# Only a real data change pays for npm ci + build + FTP. workflow_dispatch
# bypasses the gate so you can force a redeploy.

on:
  schedule:
    # 04:00 UTC daily - safety net for off-weekends and anything missed by
    # the race-weekend cron below.
    - cron: '0 4 * * *'
    # Race-weekend polling: every 10 min Sat-Sun UTC. Late US/Mexico races and sprint-quali Fridays are caught by the daily 04:00 run above. Bundle-changed gate keeps most runs no-ops.
    - cron: '*/10 * * * 6,0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Fetch current season from Jolpica
        id: fetch
        run: |
          YEAR=$(date -u +%Y)
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"
          # Don't fail the whole workflow if Jolpica is down or the year
          # has no data yet - the existing bundle (or fallback) keeps
          # the site from regressing.
          node scripts/fetch-season.mjs "$YEAR" || echo "::warning::fetch-season.mjs failed for $YEAR (continuing with existing bundle)"

      - name: Commit bundle if changed
        id: commit
        run: |
          YEAR="${{ steps.fetch.outputs.year }}"
          BUNDLE="public/data/${YEAR}.json"
          if [ ! -f "$BUNDLE" ]; then
            echo "No bundle written for $YEAR - skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$BUNDLE"
          if git diff --cached --quiet; then
            echo "No changes to ${BUNDLE} - skipping build & deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): ${YEAR} season refresh"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Cache OG images
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: public/images/og
          # Same cache key as deploy.yml - when the fetch updates a season
          # bundle, the bundle hash changes and OGs regenerate. When nothing
          # changed, the cache hits and the build is fast (though we usually
          # skip the build entirely via the changed-gate above).
          key: og-images-v1-${{ hashFiles('data/history/**', 'public/data/*.json', 'scripts/build-archive.mjs', 'scripts/generate-og-images.mjs', 'scripts/og-templates/**', 'package-lock.json') }}

      - name: Build Astro site
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Deploy via FTP
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local-dir: ./dist/
          state-name: .ftp-deploy-sync-state-dist.json
