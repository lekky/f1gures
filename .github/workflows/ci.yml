name: CI

# Test gate. Runs the vitest suite on every PR and on pushes to main.
# deploy.yml FTPs main straight to production, so this is the only automated
# check standing between a merge and the live site — it must pass before merge
# (enforce via a required status check in branch protection: Settings →
# Branches → main → Require status checks → "test").
# The vitest suite covers src/lib/ and scripts/ only, so skip it when a
# change touches nothing but docs / reference / tooling files (same list as
# deploy.yml). Note: this repo has no branch protection, so a skipped run
# never leaves a PR stuck on a required "test" check.
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'design-system/**'
      - 'feedback-worker/**'
      - '.claude/**'
      - 'README.md'
      - 'CLAUDE.md'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'design-system/**'
      - 'feedback-worker/**'
      - '.claude/**'
      - 'README.md'
      - 'CLAUDE.md'

# One in-flight run per ref; a new push supersedes the previous run.
# (Safe to cancel here, unlike the deploy workflow.)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
