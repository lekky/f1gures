name: Refresh driver career stats

on:
  schedule:
    # 05:00 UTC nightly (~06:00 UK in BST, ~05:00 in GMT). Before any reasonable visitor.
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch career stats from Jolpica
        run: node scripts/fetch-careers.mjs

      - name: Commit and push if anything changed
        run: |
          if [ -z "$(git status --porcelain public/data/careers/)" ]; then
            echo "No career-stats changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/careers/
          git commit -m "chore: refresh driver career stats"
          git push
