name: Deploy to Server

# Code/content changes to main are deployed on a BATCHED SCHEDULE, not on
# every push. Each scheduled slot rebuilds main once, picking up everything
# merged since the last successful deploy. This caps routine deploys at 3/day
# instead of one-per-push (which exhausted the free Actions minutes).
#
# Data-driven deploys (new race results) are handled separately and on their
# own cadence by refresh-current-season.yml - this workflow is only for code
# and content (blog posts, UI, etc.).
#
# Need something live immediately? Trigger this workflow by hand
# (workflow_dispatch) - it bypasses the "unchanged" gate and always deploys.

on:
  schedule:
    # Times are UTC. The user is on UK time; these map to 12:00 / 18:00 /
    # 23:00 BST (UTC+1) during summer. When UK clocks go back to GMT in late
    # October, they shift to 11:00 / 17:00 / 22:00 local - bump each cron +1h
    # then if you want to preserve the exact local slots.
    - cron: '0 11 * * *'  # ~midday UK
    - cron: '0 17 * * *'  # ~early evening UK
    - cron: '0 22 * * *'  # ~night UK
  # Manual "publish now": always deploys current main, bypassing the gate.
  # Also the escape hatch when a refresh run's own FTP step failed transiently.
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  actions: read   # read this workflow's run history for the "unchanged" gate

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # On a scheduled run, skip the whole build if main hasn't moved since the
      # last successful deploy - no point rebuilding on a day with no merges.
      # A manual dispatch always deploys (deploy=true) so "publish now" works
      # even when nothing changed (e.g. to recover a failed FTP upload).
      - name: Decide whether to deploy
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual/dispatch run - deploying current main."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST=$(gh run list -R "$GITHUB_REPOSITORY" --workflow deploy.yml \
                   --branch main --status success --limit 1 \
                   --json headSha --jq '.[0].headSha // ""' || echo "")
          if [ -n "$LAST" ] && [ "$LAST" = "$GITHUB_SHA" ]; then
            echo "main ($GITHUB_SHA) unchanged since last successful deploy - skipping build."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "main changed since last deploy (last=$LAST, now=$GITHUB_SHA) - deploying."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.decide.outputs.deploy == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.decide.outputs.deploy == 'true'
        run: npm ci

      - name: Cache OG images
        if: steps.decide.outputs.deploy == 'true'
        uses: actions/cache@v4
        with:
          path: public/images/og
          # Cache the ~2,300 generated OG PNGs by content hash of inputs that
          # affect their output. CSS-only or docs-only PRs hit the cache and
          # save ~5 min of Satori rendering. Data updates bust the key.
          key: og-images-v1-${{ hashFiles('data/history/**', 'public/data/*.json', 'scripts/build-archive.mjs', 'scripts/generate-og-images.mjs', 'scripts/og-templates/**', 'package-lock.json') }}

      - name: Build Astro site
        if: steps.decide.outputs.deploy == 'true'
        run: npm run build

      # Upload dist/ with rsync over SSH. rsync is the right tool for this tree
      # (~5,000 small files): it transfers only files whose CONTENT changed
      # (--checksum, so it ignores the fresh build timestamps that defeat a
      # plain FTP/mtime diff), reuses a single pipelined SSH connection instead
      # of a per-file round-trip, and compresses on the wire (-z; HTML gzips
      # ~5x). Net: a normal content deploy uploads a handful of files in
      # seconds; even a CSS cache-bust that rewrites every page's ?v= finishes
      # in ~1-2 min - versus the old single-connection FTP's ~34 min. The whole
      # channel is SSH-encrypted, so credentials + payload are never in clear.
      #
      # --delete keeps the remote an exact mirror of dist/ (as the old deploy
      # did), but .well-known and cgi-bin are excluded so we never remove the
      # hosting-managed dirs (cPanel AutoSSL validation, CGI).
      #
      # REMOTE_DIR is the site's web root RELATIVE TO THE SSH HOME dir. SSH lands
      # in /home/helloweb; f1gures.app is an addon domain whose docroot is the
      # "f1gures.app" folder there (NOT public_html - that's the main
      # HelloWebDesign site). A wrong path here combined with --delete would
      # mirror into (and prune) the wrong folder, so this is deliberately exact.
      #
      # SSH_USER is the cPanel main account (helloweb), whose authorized key we
      # imported - not the scoped FTP account in SFTP_USER (which is rooted at
      # the f1gures.app docroot and used by the FTP deploy path only).
      - name: Deploy via rsync over SSH
        if: steps.decide.outputs.deploy == 'true'
        env:
          # SSH host/port default to the FTP host on 22, but cPanel shared hosts
          # often run SSH on a non-standard port and/or a different hostname than
          # FTP. Set the optional SSH_HOST / SSH_PORT secrets to override without
          # a code change.
          SSH_HOST: ${{ secrets.SSH_HOST || secrets.SFTP_HOST }}
          SSH_USER: helloweb
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_DIR: f1gures.app
        run: |
          set -euo pipefail
          if [ -z "${SSH_KEY:-}" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not set - add it before deploying (see docs/deploy-ssh.md)."
            exit 1
          fi
          # Safety net for --delete: never mirror a broken/empty build over the
          # live site. The real dist/ has ~5,000 files; anything under 1,000
          # means the build misfired, so refuse rather than prune production.
          FILES=$(find ./dist -type f | wc -l)
          echo "dist/ contains $FILES files"
          if [ "$FILES" -lt 1000 ]; then
            echo "::error::dist/ has only $FILES files (<1000) - refusing to rsync --delete against the live site."
            exit 1
          fi
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # TOFU: pin the host key on first connect (avoids a MITM window
          # without hand-maintaining known_hosts across runner images).
          rsync -rlz --checksum --delete --verbose \
            --exclude='.well-known' --exclude='cgi-bin' \
            --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new" \
            ./dist/ "$SSH_USER@$SSH_HOST:$REMOTE_DIR/"
