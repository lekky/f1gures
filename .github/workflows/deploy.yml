name: Deploy to Server

on:
  push:
    branches:
      - main
  # Manual redeploy of current main. Needed when a refresh run commits a new
  # bundle but its FTP deploy fails transiently: later refreshes are no-ops
  # (changed=false skips build+deploy), so the change never reaches the live
  # server without a way to re-trigger a deploy on demand.
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache OG images
        uses: actions/cache@v4
        with:
          path: public/images/og
          # Cache the ~2,300 generated OG PNGs by content hash of inputs that
          # affect their output. CSS-only or docs-only PRs hit the cache and
          # save ~5 min of Satori rendering. Data updates bust the key.
          key: og-images-v1-${{ hashFiles('data/history/**', 'public/data/*.json', 'scripts/build-archive.mjs', 'scripts/generate-og-images.mjs', 'scripts/og-templates/**', 'package-lock.json') }}

      - name: Build Astro site
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local-dir: ./dist/
          # First deploy from dist/ uploads ~110 files and removes the legacy
          # repo-root files. Reset state so the diff is computed from scratch.
          state-name: .ftp-deploy-sync-state-dist.json
